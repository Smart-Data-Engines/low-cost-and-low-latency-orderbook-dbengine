[pytest]
testpaths = .
markers =
    smoke: Smoke tests (single node basic operations)
    replication: WAL replication tests
    failover: Automatic failover tests
    compression: LZ4 compression tests
    stress: Stress and throughput tests
    edge_cases: Edge case and error handling tests
    metrics: Prometheus metrics and STATUS tests
    pool: Client pool mode tests
    cpp_client: Native C++ client tests
timeout = 120
